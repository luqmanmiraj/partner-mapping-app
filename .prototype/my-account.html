<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Information</title>
  <style>
    /* Reset & Base Styles */
    .my-account-container * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Main Card Wrapper */
    .my-account-container {
      background-color: #f8f9fa;
      border-radius: 4px;
      padding: 24px;
      max-width: 900px;
      margin: 20px auto;
    }

    /* Header Title */
    .my-account-title {
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 20px;
    }

    /* Inner Card Content */
    .my-account-card {
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 30px;
    }

    /* Profile Section */
    .my-account-profile {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 30px;
    }

    .my-account-logo-box {
      width: 140px;
      height: 140px;
      border: 1px solid #cccccc;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background-color: #ffffff;
    }

    .my-account-logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .my-account-company-header-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .my-account-company-main-name {
      font-size: 28px;
      font-weight: 700;
      color: #000000;
    }

    .my-account-company-type {
      font-size: 16px;
      color: #666666;
    }

    /* Form Grid Layout */
    .my-account-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
      row-gap: 16px;
    }

    /* Form Group Components */
    .my-account-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .my-account-form-group.my-account-full-width {
      grid-column: span 1;
    }

    .my-account-label {
      font-size: 13px;
      font-weight: 700;
      color: #111111;
    }

    .my-account-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .my-account-input {
      width: 100%;
      height: 40px;
      padding: 8px 12px;
      border: 1px solid #888888;
      border-radius: 4px;
      font-size: 14px;
      color: #333333;
      background-color: #ffffff;
      outline: none;
    }

    .my-account-input::placeholder {
      color: #aaaaaa;
    }

    /* Disabled/Locked Email State */
    .my-account-input-disabled {
      background-color: #e0e0e0;
      border-color: #bbbbbb;
      color: #555555;
      padding-right: 36px;
    }

    .my-account-lock-icon {
      position: absolute;
      right: 12px;
      width: 14px;
      height: 14px;
      fill: #555555;
    }

    /* Info Note Footer */
    .my-account-info-note {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .my-account-info-icon {
      width: 16px;
      height: 16px;
      fill: #777777;
    }

    .my-account-note-text {
      font-size: 12px;
      color: #777777;
    }

    /* Responsive adjustment for small screens */
    @media (max-width: 600px) {
      .my-account-form-grid {
        grid-template-columns: 1fr;
      }
      .my-account-info-note {
        grid-column: span 1;
      }
      .my-account-profile {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="my-account-container">
    <h2 class="my-account-title">General information</h2>
    
    <div class="my-account-card">
      
      <div class="my-account-profile">
        <div class="my-account-logo-box">
          <svg viewBox="0 0 120 40" width="100%" height="100%">
            <text x="5" y="28" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#00754a" letter-spacing="-1">Feu Vert</text>
          </svg>
        </div>
        <div class="my-account-company-header-info">
          <h1 class="my-account-company-main-name">Feu Vert</h1>
          <p class="my-account-company-type">Original Equipment Manufacturer / Aftermarket</p>
        </div>
      </div>

      <form class="my-account-form-grid" onsubmit="return false;">
        
        <div class="my-account-form-group">
          <label class="my-account-label">Company Name</label>
          <input type="text" class="my-account-input" value="Bosch Automotive" />
        </div>

        <div class="my-account-form-group">
          <label class="my-account-label">Country</label>
          <input type="text" class="my-account-input" value="Switzerland" />
        </div>

        <div class="my-account-form-group">
          <label class="my-account-label">Main Contact</label>
          <input type="text" class="my-account-input" placeholder="Name Last Name" />
        </div>

        <div class="my-account-form-group">
          <label class="my-account-label">Phone number</label>
          <input type="tel" class="my-account-input" value="+ 33 01 02 03 04 05" />
        </div>

        <div class="my-account-form-group my-account-full-width">
          <label class="my-account-label">E-mail</label>
          <div class="my-account-input-wrapper">
            <input type="email" class="my-account-input my-account-input-disabled" value="contact@bosch.com" readonly />
            <svg class="my-account-lock-icon" viewBox="0 0 24 24">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
        </div>

        <div class="my-account-info-note">
          <svg class="my-account-info-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          <span class="my-account-note-text">Your email serves as a unique identifier. You cannot change it.</span>
        </div>

      </form>

    </div>
  </div>

</body>
</html>
