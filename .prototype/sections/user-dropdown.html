<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dropdown Menu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f9fb;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- Dropdown Card Container --- */
        .profile-dropdown {
            width: 280px;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* --- Identity Header Segment --- */
        .dropdown-header {
            background-color: #111111;
            padding: 24px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .user-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .user-email {
            color: #cccccc;
            font-size: 13px;
            font-weight: 400;
            word-break: break-all;
        }

        /* --- Action Menu Interactive List --- */
        .dropdown-menu-list {
            list-style: none;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            width: 100%;
        }

        .menu-link {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: none;
            border: none;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease;
        }

        /* Information Action Item */
        .link-info {
            color: #111111;
        }

        .link-info:hover {
            background-color: #f5f5f5;
        }

        /* Log out Destructive Action Item */
        .link-logout {
            color: #e53e3e; /* Red action text */
        }

        .link-logout:hover {
            background-color: #fff5f5;
        }

        .menu-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="profile-dropdown">
        <div class="dropdown-header">
            <h2 class="user-name">Name Last Name</h2>
            <span class="user-email">email@nexus.com</span>
        </div>

        <ul class="dropdown-menu-list">
            <li class="menu-item">
                <a href="#information" class="menu-link link-info">
                    <span class="menu-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    Information
                </a>
            </li>
            <li class="menu-item">
                <button class="menu-link link-logout">
                    <span class="menu-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </span>
                    Log out
                </button>
            </li>
        </ul>
    </div>

</body>
</html>
