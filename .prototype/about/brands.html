<!DOCTYPE html>
<html lang="en">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* --- Core Resets & Variables --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #111111;
      padding: 40px 20px;
    }

    /* --- Container & Layout Header --- */
    .brand-section {
      max-width: 1140px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .section-header h2 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* --- Primary Action Button --- */
    .download-all-btn {
      background-color: #111111;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    .download-all-btn:hover {
      background-color: #2a2a2a;
    }

    /* --- Cards Grid Layout --- */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* --- Individual File Download Card --- */
    .file-card {
      background-color: #ffffff;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.01);
    }

    .file-info-block {
      display: flex;
      align-items: center;
      gap: 14px;
      overflow: hidden;
    }

    /* Left Orange Custom File Icon Wrapper */
    .file-icon-box {
      background-color: #fcf6ec;
      border-radius: 6px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f39c12; /* Brand orange accent */
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .file-text-details {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .file-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #111111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .file-size {
      font-size: 0.8rem;
      color: #888888;
      font-weight: 500;
    }

    /* Right Action Utility Links */
    .file-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .action-link {
      color: #555555;
      font-size: 1rem;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .action-link:hover {
      color: #111111;
    }

    /* --- Adaptive Breakpoints --- */
    @media (max-width: 992px) {
      .files-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      body {
        padding: 20px 10px;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .download-all-btn {
        width: 100%;
        justify-content: center;
      }

      .files-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }
  </style>
</head>
