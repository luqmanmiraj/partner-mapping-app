# CI: unit, integration, and isolation tests with coverage on every push and PR.

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: pytest tests/services tests/widgets tests/pages -v --tb=short -m unit

      - name: Integration tests
        run: pytest tests/integration -v --tb=short -m integration

      - name: Isolation tests
        run: pytest tests/isolation -v --tb=short -m isolation

      - name: Full suite with coverage gate
        run: |
          pytest tests/ \
            --cov=services \
            --cov=widgets \
            --cov=pages \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=65 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

