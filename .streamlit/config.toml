[theme]
primaryColor = "#F58220"
backgroundColor = "#F4F4F5"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A1A1A"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 250

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
initialSidebarState = "expanded"
